<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f4f6fb;
  --ink: #1a1f2e;
  --ink-mid: #5a6478;
  --ink-dim: #9aa0ae;
  --line: rgba(26,31,46,0.10);
  --accent: #1a56db;
  --accent2: #0e9f6e;
  --surface: #ffffff;
  --surface2: #f0f2f8;
  --f-sans: system-ui, -apple-system, 'Segoe UI', sans-serif;
  --f-mono: 'DM Mono', 'Fira Mono', monospace;
  --radius-card: 14px;
}

html { font-size: 16px; scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--f-sans);
  font-weight: 400;
  line-height: 1.65;
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: 3rem;
}

/* ── TOPBAR ── */
.topbar-signature {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px 1rem;
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  z-index: 2000;
  background: rgba(244,246,251,0.82);
  backdrop-filter: blur(24px) saturate(1.5);
  -webkit-backdrop-filter: blur(24px) saturate(1.5);
}
.topbar-signature a {
  display: inline-flex;
  align-items: center;
  gap: 0;
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.3em;
  color: #5a5f6e;
  text-decoration: none;
  text-transform: lowercase;
  transition: color 0.25s ease;
}
.topbar-signature a .sig-slash { color: var(--accent); transition: color 0.25s ease; }
.topbar-signature a .sig-arrow {
  display: inline-block; margin-left: 0.4em;
  opacity: 0; transform: translate(-4px, 4px);
  transition: opacity 0.25s ease, transform 0.25s ease;
  font-size: 10px; color: var(--accent); letter-spacing: 0;
}
.topbar-signature a:hover { color: var(--accent); }
.topbar-signature a:hover .sig-arrow { opacity: 1; transform: translate(0, 0); }

/* ── SOCIAL BAR ── */
.social-bar {
  position: fixed;
  top: 50%;
  right: 18px;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 1500;
}
.social-bar a {
  display: flex; align-items: center; justify-content: center;
  width: 28px; height: 28px;
  color: var(--ink-dim);
  text-decoration: none;
  transition: color 0.2s, transform 0.2s;
  opacity: 0.55;
}
.social-bar a:hover { color: var(--accent); opacity: 1; transform: translateX(-2px); }
.social-bar svg { width: 15px; height: 15px; fill: currentColor; }

/* ── HERO ── */
.hero {
  text-align: center;
  padding: 3rem 1rem 2rem;
  max-width: 680px;
  margin: 0 auto;
}
.hero-tag {
  display: inline-block;
  font-size: 0.65rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 500;
  margin-bottom: 1rem;
  background: rgba(26,86,219,0.08);
  padding: 4px 12px;
  border-radius: 50px;
}
.hero h1 {
  font-size: clamp(1.8rem, 5vw, 2.8rem);
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.02em;
  line-height: 1.15;
  margin-bottom: 0.75rem;
}
.hero h1 span { color: var(--accent); }
.hero p {
  font-size: 1rem;
  color: var(--ink-mid);
  max-width: 460px;
  margin: 0 auto;
}

/* ── PROGRESS BAR ── */
.progress-wrap {
  max-width: 680px;
  margin: 1.5rem auto 0;
  padding: 0 1rem;
}
.progress-labels {
  display: flex;
  gap: 6px;
  margin-bottom: 8px;
}
.prog-label {
  flex: 1;
  font-size: 0.62rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-dim);
  text-align: center;
  transition: color 0.2s;
}
.prog-label.active { color: var(--accent); font-weight: 500; }
.prog-label.done { color: var(--accent2); }
.progress-track {
  display: flex;
  gap: 5px;
}
.prog-seg {
  flex: 1; height: 3px; border-radius: 99px;
  background: var(--line);
  transition: background 0.3s;
}
.prog-seg.done { background: var(--accent2); }
.prog-seg.active { background: var(--accent); }

/* ── STEP PANEL ── */
.app-wrap {
  max-width: 680px;
  margin: 1.5rem auto 0;
  padding: 0 1rem;
}

.panel {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-card);
  padding: 1.75rem;
  margin-bottom: 1rem;
  animation: panelIn 0.3s ease both;
}
@keyframes panelIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.panel-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 1.25rem;
}
.step-badge {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  flex-shrink: 0;
}
.panel-info h2 {
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 1px;
}
.panel-info .step-num {
  font-size: 0.7rem;
  color: var(--ink-dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.objective {
  background: var(--surface2);
  border-left: 3px solid var(--step-color, var(--accent));
  border-radius: 0 8px 8px 0;
  padding: 10px 14px;
  margin-bottom: 1.25rem;
  font-size: 0.88rem;
  color: var(--ink-mid);
  line-height: 1.55;
}

.tips-title {
  font-size: 0.68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-dim);
  margin-bottom: 10px;
}
.tip {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  margin-bottom: 8px;
  font-size: 0.88rem;
  color: var(--ink);
  line-height: 1.5;
}
.tip-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  margin-top: 8px;
  flex-shrink: 0;
  background: var(--step-color, var(--accent));
}

.example-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 0.82rem;
  color: var(--ink-dim);
  padding: 8px 0;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 4px;
  transition: color 0.2s;
}
.example-btn:hover { color: var(--ink); }
.example-box {
  display: none;
  background: var(--surface2);
  border-radius: 8px;
  padding: 12px 14px;
  margin-top: 6px;
  font-size: 0.85rem;
  color: var(--ink-mid);
  line-height: 1.7;
  font-style: italic;
  border: 1px solid var(--line);
  white-space: pre-wrap;
}
.example-box.open { display: block; }

.field-wrap {
  margin-top: 1.25rem;
}
.field-label {
  font-size: 0.78rem;
  color: var(--ink-dim);
  display: block;
  margin-bottom: 6px;
}
textarea {
  width: 100%;
  min-height: 120px;
  resize: vertical;
  font-size: 0.92rem;
  font-family: var(--f-sans);
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid rgba(26,31,46,0.15);
  background: var(--bg);
  color: var(--ink);
  line-height: 1.6;
  transition: border-color 0.2s;
}
textarea:focus {
  outline: none;
  border-color: var(--step-color, var(--accent));
  background: var(--surface);
}
.char-count {
  font-size: 0.72rem;
  color: var(--ink-dim);
  text-align: right;
  margin-top: 4px;
}

/* ── NAV BUTTONS ── */
.nav-row {
  display: flex;
  gap: 10px;
  justify-content: space-between;
  margin-top: 0.5rem;
}
.btn {
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 0.88rem;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid rgba(26,31,46,0.15);
  background: var(--surface);
  color: var(--ink);
  transition: all 0.2s;
  font-family: var(--f-sans);
}
.btn:hover { background: var(--surface2); border-color: var(--ink-dim); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.btn.primary:hover { opacity: 0.88; }

/* ── RECAP ── */
.recap-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 1.5rem;
}
.score-circle {
  width: 64px; height: 64px;
  border-radius: 50%;
  border: 3px solid;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  flex-shrink: 0;
}
.score-num { font-size: 18px; font-weight: 700; }
.score-lbl { font-size: 9px; color: var(--ink-dim); letter-spacing: 0.05em; }
.recap-intro h2 { font-size: 1.05rem; font-weight: 600; color: var(--ink); }
.recap-intro p { font-size: 0.82rem; color: var(--ink-mid); }

.recap-part {
  background: var(--surface2);
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 10px;
}
.recap-part-label {
  font-size: 0.65rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 5px;
}
.recap-part-text {
  font-size: 0.88rem;
  color: var(--ink);
  line-height: 1.65;
  white-space: pre-wrap;
}
.recap-part-empty {
  font-size: 0.82rem;
  color: var(--ink-dim);
  font-style: italic;
}

.copy-btn {
  width: 100%;
  margin-top: 0.5rem;
  justify-content: center;
  background: var(--surface2);
  border: 1px solid var(--line);
}
.copy-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .social-bar { display: none; }
  .hero { padding: 2rem 1rem 1.5rem; }
}
</style>
</head>

<header class="hero">
  <div class="hero-tag">Anthropotech · Lab</div>
  <h1><span>Scribe</span></h1>
  <p>Guide interactif en 4 étapes pour rédiger une lettre de motivation qui retient l'attention.</p>
</header>

<!-- PROGRESS -->
<div class="progress-wrap">
  <div class="progress-labels" id="prog-labels"></div>
  <div class="progress-track" id="prog-track"></div>
</div>

<!-- MAIN -->
<main class="app-wrap" id="app">
  <div id="panel-area"></div>
  <div class="nav-row">
    <button class="btn" id="btn-prev" onclick="navigate(-1)">← Précédent</button>
    <button class="btn primary" id="btn-next" onclick="navigate(1)">Suivant →</button>
  </div>
</main>

<script>
const STEPS = [
  {
    num: "01", label: "L'organisation",
    color: "#1a56db", bg: "#dbeafe", textC: "#1e3a8a",
    objective: "Montrez que vous connaissez l'organisation et que vous comprenez pourquoi vous voulez y travailler — pas juste « parce que c'est une belle entreprise ».",
    tips: [
      "Citez un élément concret : un projet récent, une valeur affichée, un service spécifique.",
      "Reliez cet élément à votre envie de rejoindre l'équipe.",
      "Évitez les formules creuses comme « entreprise dynamique et innovante ».",
      "2 à 4 phrases suffisent : c'est une accroche, pas une fiche Wikipedia."
    ],
    example: "J'ai été particulièrement attentif(ve) au lancement de votre service d'accompagnement à domicile en 2023, qui traduit concrètement l'engagement de votre structure en faveur du maintien à domicile des personnes âgées. C'est précisément dans ce type de projet que je souhaite m'investir.",
    placeholder: "Parlez de l'organisation : un projet, une valeur, un service qui vous a convaincu(e)..."
  },
  {
    num: "02", label: "Vos compétences",
    color: "#0e9f6e", bg: "#d1fae5", textC: "#065f46",
    objective: "Mettez en regard vos compétences et le profil recherché dans l'offre. Chaque point que vous citez doit avoir un écho direct dans la fiche de poste.",
    tips: [
      "Relisez attentivement le profil de poste avant d'écrire ce paragraphe.",
      "Ne listez pas toutes vos compétences : sélectionnez les 2 ou 3 qui collent le mieux.",
      "Illustrez avec un exemple concret ou un résultat chiffré si possible.",
      "Reformulez les mots-clés du poste avec vos propres mots, sans copier mot pour mot."
    ],
    example: "Fort(e) de 5 ans d'expérience en gestion de projet dans le secteur public, j'ai coordonné des équipes pluridisciplinaires et piloté des budgets en mode projet. La compétence en conduite du changement, centrale dans votre offre, est au cœur de mon parcours.",
    placeholder: "Citez vos compétences en lien direct avec ce que demande le poste..."
  },
  {
    num: "03", label: "Le rendez-vous",
    color: "#d97706", bg: "#fef3c7", textC: "#78350f",
    objective: "Demandez explicitement un entretien. C'est une étape que beaucoup oublient, ce qui laisse le recruteur sans porte d'entrée claire pour la suite.",
    tips: [
      "Formulez la demande clairement et positivement.",
      "Proposez votre disponibilité sans être envahissant(e).",
      "Mentionnez que vous pouvez fournir des éléments complémentaires si besoin.",
      "Restez concis(e) : une ou deux phrases, pas un paragraphe."
    ],
    example: "Je serais ravi(e) de vous présenter mon parcours lors d'un entretien à votre convenance. Je reste disponible pour tout échange complémentaire et vous adresse en pièce jointe mon curriculum vitæ.",
    placeholder: "Demandez le rendez-vous, indiquez votre disponibilité..."
  },
  {
    num: "04", label: "Formule de politesse",
    color: "#7c3aed", bg: "#ede9fe", textC: "#4c1d95",
    objective: "Terminez par une formule respectueuse et professionnelle. Elle doit être adaptée au secteur et ne jamais paraître froide ou expédiée.",
    tips: [
      "Pour le secteur public ou formel : « Veuillez agréer, Madame, Monsieur, l'expression de mes salutations distinguées. »",
      "Pour un secteur plus agile : « Dans l'attente de votre retour, je vous adresse mes cordiales salutations. »",
      "Évitez « Cordialement » seul — trop sec pour une lettre.",
      "Ajoutez votre prénom et nom sous la formule."
    ],
    example: "Dans l'attente de votre retour, je vous prie d'agréer, Madame, Monsieur, l'expression de mes sincères salutations.\n\nPrénom Nom",
    placeholder: "Écrivez votre formule de politesse et votre signature..."
  }
];

let current = 0;
const texts = ["", "", "", ""];

function renderProgress() {
  const labels = document.getElementById("prog-labels");
  const track = document.getElementById("prog-track");
  labels.innerHTML = STEPS.map((s, i) => {
    let cls = "prog-label";
    if (i < current) cls += " done";
    else if (i === current) cls += " active";
    return `<div class="${cls}">${s.label}</div>`;
  }).join("");
  track.innerHTML = STEPS.map((_, i) => {
    let cls = "prog-seg";
    if (i < current) cls += " done";
    else if (i === current) cls += " active";
    return `<div class="${cls}"></div>`;
  }).join("");
}

function renderPanel() {
  const area = document.getElementById("panel-area");
  if (current === STEPS.length) {
    renderRecap(area);
    return;
  }
  const s = STEPS[current];
  area.innerHTML = `
    <div class="panel" style="--step-color:${s.color}">
      <div class="panel-header">
        <div class="step-badge" style="background:${s.bg};color:${s.textC}">${s.num}</div>
        <div class="panel-info">
          <div class="step-num">Étape ${s.num} sur 04</div>
          <h2>${s.label}</h2>
        </div>
      </div>
      <div class="objective">${s.objective}</div>
      <div class="tips-title">Conseils</div>
      ${s.tips.map(t => `<div class="tip"><div class="tip-dot"></div><span>${t}</span></div>`).join("")}
      <button class="example-btn" onclick="toggleEx(this)">
        <span>▸</span> Voir un exemple
      </button>
      <div class="example-box">${s.example}</div>
      <div class="field-wrap">
        <label class="field-label">Votre rédaction pour cette partie</label>
        <textarea id="ta" placeholder="${s.placeholder}" oninput="saveText(this)">${texts[current]}</textarea>
        <div class="char-count" id="cc">${texts[current].length} car.</div>
      </div>
    </div>
  `;
}

function renderRecap(area) {
  const filled = texts.filter(t => t.trim()).length;
  const pct = Math.round((filled / 4) * 100);
  const color = pct === 100 ? "#0e9f6e" : pct >= 50 ? "#d97706" : "#e02424";
  area.innerHTML = `
    <div class="panel">
      <div class="recap-header">
        <div class="score-circle" style="border-color:${color};color:${color}">
          <span class="score-num">${pct}%</span>
          <span class="score-lbl">complet</span>
        </div>
        <div class="recap-intro">
          <h2>Votre lettre</h2>
          <p>Relisez, ajustez, puis copiez le tout.</p>
        </div>
      </div>
      ${STEPS.map((s, i) => `
        <div class="recap-part">
          <div class="recap-part-label" style="color:${s.color}">Étape ${s.num} — ${s.label}</div>
          ${texts[i].trim()
            ? `<div class="recap-part-text">${texts[i]}</div>`
            : `<div class="recap-part-empty">Non renseigné</div>`}
        </div>
      `).join("")}
      <button class="btn copy-btn" onclick="copyAll()">Copier la lettre complète</button>
    </div>
  `;
}

function toggleEx(btn) {
  const box = btn.nextElementSibling;
  box.classList.toggle("open");
  btn.querySelector("span").textContent = box.classList.contains("open") ? "▾" : "▸";
}

function saveText(ta) {
  texts[current] = ta.value;
  const cc = document.getElementById("cc");
  if (cc) cc.textContent = ta.value.length + " car.";
}

function navigate(dir) {
  const next = current + dir;
  if (next < 0 || next > STEPS.length) return;
  current = next;
  refresh();
}

function refresh() {
  renderProgress();
  renderPanel();
  document.getElementById("btn-prev").disabled = current === 0;
  const btnNext = document.getElementById("btn-next");
  if (current >= STEPS.length) {
    btnNext.textContent = "Recommencer";
    btnNext.onclick = () => { current = 0; texts.fill(""); refresh(); };
  } else {
    btnNext.textContent = current === STEPS.length - 1 ? "Voir le récap →" : "Suivant →";
    btnNext.onclick = () => navigate(1);
  }
}

function copyAll() {
  const full = texts.map(t => t.trim()).filter(Boolean).join("\n\n");
  if (!full) { alert("Aucun contenu à copier."); return; }
  navigator.clipboard.writeText(full).then(() => {
    const btn = document.querySelector(".copy-btn");
    const prev = btn.textContent;
    btn.textContent = "Copié !";
    setTimeout(() => btn.textContent = prev, 2000);
  });
}

refresh();
</script>
</body>
</html>
