<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scribe · Accompagnement emploi — Anthropotech Lab</title>
<meta name="description" content="Scribe vous accompagne dans votre recherche d'emploi : CV, lettre de motivation, préparation entretien. Gratuit, sans compte, aucune donnée collectée.">
<meta name="robots" content="index, follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<style>
/* ═══════════════════════════════════════
   RESET & TOKENS
═══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Palette */
  --bg:#faf9f7;--bg1:#f3f0ec;--bg2:#e8e4de;--bg3:#d5cfc7;
  --ink:#1a1714;--ink2:#3d3730;--ink3:#7a7269;--ink4:#b0a99f;
  --accent:#2c5f8a;--accent2:#1e4266;--accent-bg:rgba(44,95,138,.07);
  --green:#2d7a52;--green-bg:rgba(45,122,82,.07);
  --amber:#b85c1a;--amber-bg:rgba(184,92,26,.08);
  --red:#9b2335;--red-bg:rgba(155,35,53,.07);
  --purple:#5b3d8a;--purple-bg:rgba(91,61,138,.07);
  /* Typography */
  --serif:'Instrument Serif',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
  /* Spacing */
  --r:6px;--r2:10px;--r3:16px;
  /* Sidebar */
  --sb:260px;
  /* Transitions */
  --tr:.18s ease;
}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:var(--sans);color:var(--ink);background:var(--bg);line-height:1.65;-webkit-font-smoothing:antialiased}

/* DARK MODE */
body.dark{
  --bg:#131210;--bg1:#1c1a17;--bg2:#25221e;--bg3:#302c27;
  --ink:#f0ece6;--ink2:#c8c0b5;--ink3:#8a8078;--ink4:#504840;
  --accent:#5b9fd4;--accent2:#7ab5e0;--accent-bg:rgba(91,159,212,.08);
  --green:#5aab80;--green-bg:rgba(90,171,128,.08);
  --amber:#e8843a;--amber-bg:rgba(232,132,58,.08);
  --red:#d4566a;--red-bg:rgba(212,86,106,.08);
}

/* ACCESSIBILITY */
body.dyslexic{font-family:'OpenDyslexic',Arial,sans-serif!important;letter-spacing:.05em;word-spacing:.15em;line-height:2}
body.contrast{--bg:#000;--bg1:#111;--bg2:#1a1a1a;--ink:#fff;--ink2:#f0f0f0;--accent:#60b8ff;--green:#5aff90}

/* ═══════════════════════════════════════
   LAYOUT SHELL
═══════════════════════════════════════ */
.app-shell{display:grid;grid-template-columns:var(--sb) 1fr;grid-template-rows:auto 1fr;min-height:100vh}
.topbar{grid-column:1/-1;position:sticky;top:0;z-index:300;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;background:rgba(250,249,247,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--bg2)}
body.dark .topbar{background:rgba(19,18,16,.95)}
.tb-brand{display:flex;align-items:center;gap:.75rem}
.tb-logo{font-family:var(--mono);font-size:.65rem;letter-spacing:.25em;color:var(--ink3);text-decoration:none;text-transform:uppercase}
.tb-logo em{color:var(--accent);font-style:normal}
.tb-divider{width:1px;height:16px;background:var(--bg2)}
.tb-appname{font-family:var(--serif);font-size:1.05rem;color:var(--ink);font-style:italic;letter-spacing:.01em}
.tb-tagline{font-size:.62rem;color:var(--ink3);margin-top:-2px;letter-spacing:.02em}
.tb-actions{display:flex;align-items:center;gap:1px}
.tba{background:none;border:none;font-size:.68rem;color:var(--ink3);cursor:pointer;padding:5px 8px;border-radius:var(--r);font-family:var(--sans);transition:all var(--tr);white-space:nowrap}
.tba:hover{color:var(--ink);background:var(--bg1)}
.tba.on{color:var(--accent);font-weight:600;background:var(--accent-bg)}
.tb-sep{width:1px;height:14px;background:var(--bg2);margin:0 4px}

/* SIDEBAR */
.sidebar{border-right:1px solid var(--bg2);background:var(--bg);display:flex;flex-direction:column;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.sidebar::-webkit-scrollbar{width:2px}
.sidebar::-webkit-scrollbar-thumb{background:var(--bg2);border-radius:2px}

/* NAV */
.sb-nav{padding:.75rem .5rem;flex:1}
.sb-section{margin-bottom:.25rem}
.sb-label{font-size:.52rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink4);padding:.5rem .75rem .2rem;display:block}
.nav-item{display:flex;align-items:center;gap:.6rem;padding:.45rem .75rem;border-radius:var(--r);cursor:pointer;transition:all var(--tr);border:none;background:none;font-family:var(--sans);width:100%;text-align:left;position:relative}
.nav-item:hover{background:var(--bg1)}
.nav-item.active{background:var(--accent-bg)}
.nav-item.active .nav-icon{color:var(--accent)}
.nav-item.active .nav-lbl{color:var(--accent);font-weight:600}
.nav-icon{width:28px;height:28px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0;background:var(--bg1);color:var(--ink3);transition:all var(--tr)}
.nav-item.active .nav-icon{background:var(--accent-bg);color:var(--accent)}
.nav-text{flex:1;min-width:0}
.nav-lbl{font-size:.78rem;color:var(--ink2);display:block;font-weight:400;line-height:1.2}
.nav-sub{font-size:.6rem;color:var(--ink4);margin-top:1px;display:block}
.nav-badge{font-size:.52rem;font-weight:600;padding:1px 5px;border-radius:20px;background:var(--accent-bg);color:var(--accent);flex-shrink:0}
.nav-done{width:12px;height:12px;border-radius:50%;background:var(--green);flex-shrink:0;display:none}
.nav-item.done .nav-done{display:block}
.nav-sep{height:1px;background:var(--bg2);margin:.35rem .75rem}

/* SB FOOTER */
.sb-footer{padding:.75rem;border-top:1px solid var(--bg2)}
.sb-prog-wrap{margin-bottom:.625rem}
.sb-prog-hdr{display:flex;justify-content:space-between;font-size:.62rem;color:var(--ink3);margin-bottom:.3rem}
.sb-prog-bar{height:3px;background:var(--bg2);border-radius:3px;overflow:hidden}
.sb-prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:3px;transition:width .5s}
.sb-tip{font-size:.62rem;color:var(--ink4);line-height:1.45;padding:.4rem .5rem;background:var(--bg1);border-radius:var(--r);border-left:2px solid var(--accent)}
.sb-tip strong{color:var(--accent)}

/* SOCIAL */
.sb-social{display:flex;gap:.3rem;flex-wrap:wrap;margin-top:.5rem}
.ss-link{width:22px;height:22px;color:var(--ink4);text-decoration:none;display:flex;align-items:center;justify-content:center;border-radius:var(--r);transition:all var(--tr)}
.ss-link:hover{color:var(--ink3);background:var(--bg1)}
.ss-link svg{width:10px;height:10px;fill:currentColor}

/* MAIN */
.main-area{background:var(--bg);min-height:calc(100vh - 52px);display:flex;flex-direction:column}
.page{display:none;flex:1}
.page.active{display:flex;flex-direction:column}

/* ═══════════════════════════════════════
   DESIGN SYSTEM COMPONENTS
═══════════════════════════════════════ */
/* Page header */
.ph{padding:2rem 2.5rem 0}
.ph-eyebrow{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem}
.ph-tag{font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);background:var(--accent-bg);border-radius:20px;padding:2px 10px}
.ph-title{font-family:var(--serif);font-size:1.8rem;color:var(--ink);line-height:1.15;font-style:italic;letter-spacing:-.01em}
.ph-desc{font-size:.82rem;color:var(--ink3);margin-top:.4rem;line-height:1.6;max-width:560px}

/* Content area */
.content{padding:1.5rem 2.5rem 4rem;flex:1}

/* Cards */
.card{background:var(--bg);border:1px solid var(--bg2);border-radius:var(--r3);padding:1.25rem}
.card.elevated{box-shadow:0 2px 12px rgba(0,0,0,.05)}
.card-title{font-size:.78rem;font-weight:600;color:var(--ink);margin-bottom:.875rem;display:flex;align-items:center;gap:.5rem}
.card-title svg{width:14px;height:14px;color:var(--accent)}

/* Grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.75rem}

/* KPI */
.kpi{background:var(--bg);border:1px solid var(--bg2);border-radius:var(--r2);padding:1rem}
.kpi-val{font-family:var(--mono);font-size:1.6rem;font-weight:500;line-height:1;color:var(--ink)}
.kpi-lbl{font-size:.6rem;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-top:.2rem}
.kpi-delta{font-size:.65rem;margin-top:.3rem}
.kpi-delta.up{color:var(--green)}.kpi-delta.dn{color:var(--red)}

/* Alerts */
.alert{padding:.6rem .875rem;border-radius:var(--r2);font-size:.76rem;display:flex;align-items:flex-start;gap:.5rem;line-height:1.5;margin-bottom:.75rem}
.alert svg{width:13px;height:13px;flex-shrink:0;margin-top:2px}
.alert.info{background:var(--accent-bg);border:1px solid rgba(44,95,138,.18);color:var(--accent)}
.alert.success{background:var(--green-bg);border:1px solid rgba(45,122,82,.2);color:var(--green)}
.alert.warn{background:var(--amber-bg);border:1px solid rgba(184,92,26,.2);color:var(--amber)}
.alert.tip{background:var(--bg1);border:1px solid var(--bg2);color:var(--ink2)}
.alert.tip::before{content:'"';font-family:var(--serif);font-size:1.4rem;color:var(--accent);line-height:0;margin-top:.3rem;flex-shrink:0}

/* Sections */
.sec{margin-bottom:1.5rem}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.sec-ttl{font-size:.6rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3)}

/* Forms */
.field{display:flex;flex-direction:column;gap:.25rem}
.field label{font-size:.6rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);display:flex;align-items:center;justify-content:space-between}
.req{color:var(--red)}
.opt{font-weight:400;text-transform:none;letter-spacing:0;color:var(--ink4);font-size:.58rem}
.field input,.field textarea,.field select{background:var(--bg1);border:1.5px solid var(--bg2);border-radius:var(--r2);padding:8px 11px;font-size:.82rem;font-family:var(--sans);color:var(--ink);outline:none;transition:all var(--tr);width:100%}
.field input::placeholder,.field textarea::placeholder{color:var(--ink4);font-size:.78rem}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent);background:var(--bg);box-shadow:0 0 0 3px var(--accent-bg)}
.field input.ok{border-color:var(--green)}.field input.err{border-color:var(--red)}
.field textarea{resize:vertical;line-height:1.65}
.hint{font-size:.62rem;color:var(--ink3);line-height:1.45}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:7px 15px;border-radius:var(--r2);font-size:.78rem;font-weight:500;font-family:var(--sans);cursor:pointer;border:none;transition:all var(--tr);line-height:1;white-space:nowrap}
.btn svg{width:13px;height:13px;flex-shrink:0}
.btn.pri{background:var(--accent);color:#fff}.btn.pri:hover{background:var(--accent2);transform:translateY(-1px)}
.btn.grn{background:var(--green);color:#fff}.btn.grn:hover{opacity:.9;transform:translateY(-1px)}
.btn.ghost{background:var(--bg);border:1.5px solid var(--bg2);color:var(--ink2)}.btn.ghost:hover{border-color:var(--bg3);color:var(--ink)}
.btn.text{background:none;color:var(--accent);padding:5px 8px}.btn.text:hover{background:var(--accent-bg)}
.btn.sm{padding:4px 10px;font-size:.7rem}
.btn.xs{padding:3px 7px;font-size:.64rem}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important}
.btn-row{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center}

/* Tabs */
.tabs{display:flex;background:var(--bg1);border:1.5px solid var(--bg2);border-radius:var(--r2);padding:2px;gap:2px;width:fit-content;margin-bottom:.75rem}
.tab{padding:5px 14px;font-size:.73rem;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--ink3);transition:all var(--tr);font-family:var(--sans);border-radius:var(--r)}
.tab:hover{color:var(--ink)}
.tab.on{background:var(--bg);color:var(--accent);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.07)}

/* Pills */
.pills{display:flex;gap:.3rem;flex-wrap:wrap}
.pill{padding:4px 12px;border-radius:20px;border:1.5px solid var(--bg2);background:var(--bg1);color:var(--ink3);font-size:.73rem;cursor:pointer;transition:all var(--tr);font-family:var(--sans)}
.pill:hover{border-color:var(--ink3);color:var(--ink)}
.pill.on{background:var(--ink);color:#fff;border-color:var(--ink)}

/* Checklist */
.checklist{display:flex;flex-direction:column;gap:.3rem}
.check-item{display:flex;align-items:center;gap:.625rem;padding:.5rem .75rem;border-radius:var(--r2);border:1.5px solid var(--bg2);cursor:pointer;transition:all var(--tr);background:var(--bg)}
.check-item:hover{border-color:var(--bg3)}
.check-item.done{border-color:rgba(45,122,82,.3);background:var(--green-bg)}
.check-box{width:18px;height:18px;border-radius:5px;border:2px solid var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--tr)}
.check-item.done .check-box{background:var(--green);border-color:var(--green)}
.check-lbl{font-size:.78rem;color:var(--ink2);font-weight:400;flex:1}
.check-item.done .check-lbl{color:var(--ink3);text-decoration:line-through}
.check-meta{font-size:.62rem;color:var(--ink4)}

/* Tags / Keywords */
.tag-wrap{display:flex;gap:.25rem;flex-wrap:wrap}
.tag{display:inline-flex;align-items:center;gap:3px;background:var(--accent-bg);border:1px solid rgba(44,95,138,.15);border-radius:3px;padding:2px 8px;font-size:.68rem;color:var(--accent)}
.tag button{background:none;border:none;cursor:pointer;color:currentColor;opacity:.5;font-size:.7rem;padding:0;margin-left:2px}.tag button:hover{opacity:1}

/* Accordéon */
.accord{border:1.5px solid var(--bg2);border-radius:var(--r2);overflow:hidden;margin-bottom:.4rem}
.accord-hdr{display:flex;justify-content:space-between;align-items:center;padding:.6rem .875rem;background:var(--bg1);cursor:pointer;user-select:none;transition:background var(--tr)}
.accord-hdr:hover{background:var(--bg2)}
.accord-title{font-size:.72rem;font-weight:600;color:var(--ink2)}
.accord-chevron{transition:transform .2s;font-size:.65rem;color:var(--ink3)}
.accord.open .accord-chevron{transform:rotate(180deg)}
.accord-body{padding:.875rem;font-size:.78rem;color:var(--ink2);line-height:1.65;display:none}
.accord.open .accord-body{display:block}

/* Stepper */
.step-nav{display:flex;gap:0;margin-bottom:1.5rem;border:1.5px solid var(--bg2);border-radius:var(--r2);overflow:hidden}
.step-btn{flex:1;padding:.5rem .75rem;background:var(--bg1);border:none;cursor:pointer;font-family:var(--sans);transition:all var(--tr);border-right:1px solid var(--bg2);text-align:left}
.step-btn:last-child{border-right:none}
.step-btn:hover{background:var(--bg2)}
.step-btn.on{background:var(--accent);cursor:default}
.step-btn.done{background:var(--green-bg)}
.step-n{font-size:.55rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:1px;color:var(--ink3)}
.step-btn.on .step-n,.step-btn.on .step-lbl{color:#fff}
.step-btn.done .step-n{color:var(--green)}.step-btn.done .step-lbl{color:var(--green)}
.step-lbl{font-size:.72rem;font-weight:500;color:var(--ink2)}
.step-panels{}
.step-panel{display:none}.step-panel.on{display:block}

/* Flashcard */
.flashcard{background:var(--bg);border:2px solid var(--bg2);border-radius:var(--r3);padding:1.75rem;text-align:center;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .3s;position:relative}
.fc-cat{font-size:.6rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:.75rem}
.fc-q{font-family:var(--serif);font-size:1.1rem;color:var(--ink);font-style:italic;line-height:1.4;margin-bottom:1rem}
.fc-hint{font-size:.75rem;color:var(--ink3);line-height:1.55}
.fc-nav{display:flex;gap:.5rem;justify-content:center;margin-top:1rem}

/* Badges */
.badges{display:flex;gap:.3rem;flex-wrap:wrap}
.badge{display:flex;align-items:center;gap:.3rem;padding:.3rem .625rem;border-radius:20px;font-size:.68rem;font-weight:500;border:1.5px solid var(--bg2);color:var(--ink3)}
.badge.unlocked{border-color:var(--amber);color:var(--amber);background:var(--amber-bg)}

/* Status */
.status{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:.62rem;font-weight:600;cursor:pointer;white-space:nowrap}
.status.envoyee{background:var(--accent-bg);color:var(--accent)}
.status.relance{background:var(--amber-bg);color:var(--amber)}
.status.entretien{background:var(--purple-bg);color:var(--purple)}
.status.refus{background:var(--red-bg);color:var(--red)}
.status.acceptee{background:var(--green-bg);color:var(--green)}

/* Table */
.table-wrap{overflow-x:auto;border-radius:var(--r2);border:1.5px solid var(--bg2)}
.data-table{width:100%;border-collapse:collapse;font-size:.76rem}
.data-table th{text-align:left;font-size:.58rem;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--ink3);padding:.5rem .75rem;border-bottom:2px solid var(--bg2);white-space:nowrap;background:var(--bg1)}
.data-table td{padding:.5rem .75rem;border-bottom:1px solid var(--bg2);color:var(--ink2);vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:var(--bg1)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.25);backdrop-filter:blur(3px);z-index:500;display:none;align-items:center;justify-content:center;padding:1rem}
.modal-bg.open{display:flex}
.modal{background:var(--bg);border-radius:var(--r3);padding:1.75rem;max-width:540px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.12);animation:mIn .2s ease}
@keyframes mIn{from{transform:scale(.93) translateY(8px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;padding-bottom:.875rem;border-bottom:1px solid var(--bg2)}
.modal-ttl{font-family:var(--serif);font-size:1.1rem;font-style:italic;color:var(--ink)}

/* Toast */
.toast{position:fixed;bottom:1.25rem;left:50%;transform:translateX(-50%) translateY(6px);background:rgba(26,23,20,.92);color:#f0ece6;border-radius:var(--r2);padding:7px 16px;font-size:.73rem;font-weight:500;opacity:0;pointer-events:none;transition:all .2s;z-index:700;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* FAB */
.fab{position:fixed;bottom:1.5rem;right:1.5rem;width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:.85rem;font-weight:700;display:flex;align-items:center;justify-content:center;z-index:400;box-shadow:0 4px 16px rgba(44,95,138,.35);transition:all var(--tr)}
.fab:hover{background:var(--accent2);transform:scale(1.06)}

/* Celebration */
.celeb{position:fixed;inset:0;z-index:600;pointer-events:none;display:none;align-items:center;justify-content:center}
.celeb.show{display:flex}
.confetti{position:absolute;width:6px;height:6px;border-radius:2px;animation:fall 2.8s ease forwards}
@keyframes fall{0%{transform:translateY(-40px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.celeb-msg{background:var(--bg);border:2px solid var(--green);border-radius:var(--r3);padding:1.5rem 2rem;text-align:center;pointer-events:all;animation:mIn .3s ease;position:relative;z-index:1}
.celeb-title{font-family:var(--serif);font-size:1.1rem;font-style:italic;color:var(--green)}

/* Privacy bar */
.privacy-bar{background:var(--bg1);border-bottom:1px solid var(--bg2);padding:3px 1.25rem;font-size:.62rem;color:var(--ink3);display:flex;align-items:center;gap:6px;grid-column:1/-1}
.priv-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 2.5s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

/* MOBILE */
@media(max-width:768px){
  .app-shell{grid-template-columns:1fr}
  .sidebar{display:none}
  .ph{padding:1.25rem 1rem 0}
  .content{padding:1rem 1rem 5rem}
  .grid2,.grid3,.grid4{grid-template-columns:1fr}
  .kpi-row-grid{grid-template-columns:1fr 1fr}
}

/* PRINT */
@media print{
  .app-shell{display:block}
  .sidebar,.topbar,.privacy-bar,.fab,.toast{display:none!important}
  .page{display:block!important}
  .content{padding:0}
}

/* === DASHBOARD === */
.welcome-banner{background:linear-gradient(135deg,var(--accent-bg) 0%,var(--bg1) 100%);border:1.5px solid rgba(44,95,138,.15);border-radius:var(--r3);padding:1.5rem;margin-bottom:1.5rem;position:relative;overflow:hidden}
.wb-title{font-family:var(--serif);font-size:1.4rem;font-style:italic;color:var(--ink);margin-bottom:.25rem}
.wb-sub{font-size:.78rem;color:var(--ink3);line-height:1.5}
.wb-accent{position:absolute;right:-20px;top:-20px;width:100px;height:100px;border-radius:50%;background:rgba(44,95,138,.06)}
.kpi-row-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.625rem;margin-bottom:1.25rem}
.progress-campaign{background:var(--bg);border:1.5px solid var(--bg2);border-radius:var(--r3);padding:1.25rem;margin-bottom:1.25rem}
.camp-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.camp-title{font-size:.85rem;font-weight:600;color:var(--ink)}
.camp-pct{font-family:var(--mono);font-size:1.1rem;color:var(--accent)}
.camp-steps{display:grid;grid-template-columns:repeat(7,1fr);gap:.3rem}
.camp-step{display:flex;flex-direction:column;align-items:center;gap:.3rem}
.cs-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--bg2);background:var(--bg1);display:flex;align-items:center;justify-content:center;font-size:.6rem;color:var(--ink3);transition:all .3s;cursor:pointer}
.cs-dot.done{background:var(--green);border-color:var(--green);color:#fff}
.cs-dot.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 0 3px var(--accent-bg)}
.cs-lbl{font-size:.55rem;color:var(--ink4);text-align:center;line-height:1.3}
.cs-line{height:2px;background:var(--bg2);width:100%;position:absolute;top:14px;left:50%;z-index:0}
.conseil-card{background:var(--bg1);border:1.5px solid var(--bg2);border-radius:var(--r2);padding:1rem;display:flex;gap:.75rem;align-items:flex-start;margin-bottom:1.25rem}
.cc-icon{width:32px;height:32px;border-radius:var(--r);background:var(--accent-bg);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.cc-text{flex:1}
.cc-tag{font-size:.58rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:.2rem}
.cc-body{font-size:.76rem;color:var(--ink2);line-height:1.55}

/* === CV BUILDER === */
.cv-preview-pane{background:#fff;border:1.5px solid var(--bg2);border-radius:var(--r2);padding:1.5rem;font-family:'Times New Roman',serif;font-size:10.5pt;color:#1a1714;line-height:1.5;min-height:300px}
.cvp-name{font-size:14pt;font-weight:700;margin-bottom:2px}
.cvp-contact{font-size:9pt;color:#5a5248;margin-bottom:.75rem}
.cvp-sec{margin-bottom:.625rem}
.cvp-sec-title{font-size:9pt;font-weight:700;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid #ccc;padding-bottom:1px;margin-bottom:.3rem}
.cvp-line{font-size:9.5pt;margin-bottom:2px}
.cvp-sub{font-size:9pt;color:#5a5248;padding-left:.75rem}
.cv-template-select{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:1rem}
.cv-tpl{border:2px solid var(--bg2);border-radius:var(--r2);padding:.75rem;cursor:pointer;transition:all var(--tr)}
.cv-tpl:hover,.cv-tpl.on{border-color:var(--accent);background:var(--accent-bg)}
.cv-tpl-name{font-size:.75rem;font-weight:600;color:var(--ink);margin-bottom:.2rem}
.cv-tpl-desc{font-size:.65rem;color:var(--ink3)}
.repeatable-block{border:1.5px solid var(--bg2);border-radius:var(--r2);padding:.875rem;margin-bottom:.5rem;position:relative;background:var(--bg1)}
.rb-del{position:absolute;top:.5rem;right:.5rem;background:none;border:none;cursor:pointer;color:var(--red);font-size:.72rem;opacity:.6}
.rb-del:hover{opacity:1}

/* === LETTRE === */
.prompt-box{background:var(--bg1);border:1.5px solid var(--bg2);border-radius:var(--r2);padding:1rem;font-family:var(--mono);font-size:.7rem;color:var(--ink2);line-height:1.65;white-space:pre-wrap;max-height:200px;overflow-y:auto;position:relative}
.resp-ta{width:100%;min-height:220px;resize:vertical;background:var(--bg1);border:2px solid var(--bg2);border-radius:var(--r2);padding:.875rem;font-family:'Times New Roman',serif;font-size:.88rem;color:var(--ink);line-height:1.85;outline:none;transition:all .2s}
.resp-ta:focus{border-color:var(--accent);background:var(--bg);box-shadow:0 0 0 3px var(--accent-bg)}
.resp-ta.filled{border-color:var(--green);background:var(--bg)}
.score-chips{display:flex;gap:.3rem;flex-wrap:wrap;margin-top:.625rem}
.sc{display:flex;flex-direction:column;align-items:center;padding:.4rem .625rem;border:1.5px solid var(--bg2);border-radius:var(--r2);min-width:55px;background:var(--bg1)}
.sc-v{font-family:var(--mono);font-size:.9rem;font-weight:500;line-height:1}
.sc-v.g{color:var(--green)}.sc-v.m{color:var(--amber)}.sc-v.b{color:var(--red)}
.sc-l{font-size:.52rem;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
mark.generic{background:rgba(155,35,53,.1);border-bottom:1px dashed var(--red)}
.action-card{display:flex;align-items:center;gap:.75rem;padding:.75rem;border:1.5px solid var(--bg2);border-radius:var(--r2);transition:all var(--tr);background:var(--bg)}
.action-card.done{border-color:rgba(45,122,82,.3);background:var(--green-bg)}
.action-card.locked{opacity:.25;pointer-events:none}
.ac-num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font-size:.62rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ac-num.ok{background:var(--green)}
.ac-body{flex:1}
.ac-body strong{font-size:.8rem;color:var(--ink);display:block;font-weight:600}
.ac-body span{font-size:.68rem;color:var(--ink3)}

/* === ENTRETIEN === */
.etape-card{background:var(--bg);border:1.5px solid var(--bg2);border-radius:var(--r2);padding:1rem;transition:all var(--tr)}
.etape-card:hover{border-color:var(--bg3);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.ec-icon{font-size:1.5rem;margin-bottom:.4rem}
.ec-title{font-size:.8rem;font-weight:600;color:var(--ink);margin-bottom:.2rem}
.ec-desc{font-size:.7rem;color:var(--ink3);line-height:1.5}
.interlocuteur-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:.625rem;margin-bottom:1.25rem}
.ic{border:1.5px solid var(--bg2);border-radius:var(--r2);padding:.875rem}
.ic-type{font-size:.7rem;font-weight:700;color:var(--accent);margin-bottom:.3rem}
.ic-name{font-size:.82rem;font-weight:600;color:var(--ink);margin-bottom:.25rem}
.ic-tip{font-size:.7rem;color:var(--ink3);line-height:1.5}

/* === RESSOURCES === */
.rule-card{background:var(--bg1);border-left:3px solid var(--accent);padding:.75rem 1rem;border-radius:0 var(--r2) var(--r2) 0;margin-bottom:.4rem}
.rc-title{font-size:.75rem;font-weight:600;color:var(--ink);margin-bottom:.2rem}
.rc-text{font-size:.72rem;color:var(--ink3);line-height:1.55}
.formule-card{background:var(--bg);border:1.5px solid var(--bg2);border-radius:var(--r2);padding:.875rem;transition:all var(--tr)}
.formule-card:hover{border-color:var(--bg3)}
.fc-label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.3rem}
.fc-text{font-family:'Times New Roman',serif;font-size:.82rem;color:var(--ink);font-style:italic;line-height:1.55;margin-bottom:.5rem}

/* Scrollbar global */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}
::-webkit-scrollbar-track{background:transparent}
</style>

const $get = (k,def={}) => { try { return JSON.parse(localStorage.getItem('scribe_'+k)||null) ?? def; } catch { return def; } };
const $set = (k,v) => { try { localStorage.setItem('scribe_'+k, JSON.stringify(v)); } catch {} };
const toast = msg => { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); };
const $ = id => document.getElementById(id);

function getCands() { return $get('cands', []); }
function saveCands(a) { $set('cands', a); updateSbBadge(); }
function getBiblio() { return $get('biblio', []); }
function getCount() { return $get('count', 0); }
function incCount() { const n=getCount()+1; $set('count',n); return n; }

function updateSbBadge() {
  const b = document.getElementById('badge-cands');
  if (b) b.textContent = getCands().length;
}

function calcCampPct() {
  const cv = $get('cv',{});
  const hasCv = !!(cv.prenom && cv.nom && cv.email);
  const hasLettre = getCount() > 0;
  const hasCand = getCands().length > 0;
  const hasRelance = getCands().some(c=>c.statut==='relance'||c.statut==='entretien');
  const hasBilan = !!($get('bilan',null));
  const checks = $get('dash_ck', {});
  const doneChecks = Object.values(checks).filter(Boolean).length;
  const steps = [hasCv, hasLettre, hasCand, hasRelance, hasBilan, doneChecks >= 3, getCands().some(c=>c.statut==='entretien')];
  return Math.round(steps.filter(Boolean).length / steps.length * 100);
}

function updateGlobalProgress() {
  const pct = calcCampPct();
  const bar = document.getElementById('sb-prog');
  const lbl = document.getElementById('sb-pct');
  if (bar) bar.style.width = pct + '%';
  if (lbl) lbl.textContent = pct + '%';
}

function renderKPI() {
  const cands = getCands();
  const entretiens = cands.filter(c=>c.statut==='entretien').length;
  const taux = cands.length ? Math.round(entretiens/cands.length*100) : 0;
  const data = [
    {v:getCount(),l:'Lettres générées',d:''},
    {v:cands.length,l:'Candidatures',d:`${cands.filter(c=>c.statut==='envoyee').length} en attente`},
    {v:entretiens,l:'Entretiens',d:taux+'% de taux'},
    {v:cands.filter(c=>c.statut==='acceptee').length,l:'Acceptées',d:''}
  ];
  const row = document.getElementById('kpi-row');
  if (!row) return;
  row.innerHTML = data.map(d=>`<div class="kpi"><div class="kpi-val">${d.v}</div><div class="kpi-lbl">${d.l}</div>${d.d?`<div class="kpi-delta">${d.d}</div>`:''}</div>`).join('');
}

function renderCampSteps() {
  const el = document.getElementById('camp-steps');
  const pct = document.getElementById('camp-pct');
  if (!el) return;
  const labels = ['Profil','CV','Lettre','Candidater','Relancer','Entretien','Succès'];
  const cv=$get('cv',{}); const hasCv=!!(cv.prenom&&cv.nom);
  const states = [true, hasCv, getCount()>0, getCands().length>0, getCands().some(c=>c.statut==='relance'||c.statut==='entretien'), getCands().some(c=>c.statut==='entretien'), getCands().some(c=>c.statut==='acceptee')];
  const done = states.filter(Boolean).length;
  if (pct) pct.textContent = Math.round(done/states.length*100)+'%';
  el.innerHTML = labels.map((l,i)=>`<div class="camp-step"><div class="cs-dot ${states[i]?'done':i===done?'active':''}" onclick="navTo(['cv','cv','lettre','lettre','candidatures','entretien','candidatures'][${i}]||'dashboard')">${states[i]?'✓':i+1}</div><div class="cs-lbl">${l}</div></div>`).join('');
}

function renderChecklist() {
  const el = document.getElementById('checklist');
  const cnt = document.getElementById('ck-count');
  if (!el) return;
  const checks = $get('dash_ck', {});
  const items = [
    {id:'c0',label:'Créer mon profil candidat',page:'lettre'},
    {id:'c1',label:'Rédiger mon CV',page:'cv'},
    {id:'c2',label:'Rédiger ma première lettre',page:'lettre'},
    {id:'c3',label:'Envoyer ma première candidature',page:'candidatures'},
    {id:'c4',label:'Relancer après J+10',page:'candidatures'},
    {id:'c5',label:'Préparer un entretien',page:'entretien'},
    {id:'c6',label:'Analyser les retours reçus',page:'ressources'},
  ];
  const done = items.filter(i=>checks[i.id]).length;
  if (cnt) cnt.textContent = `${done}/${items.length}`;
  el.innerHTML = items.map(item=>`<div class="check-item ${checks[item.id]?'done':''}" onclick="toggleCheck('${item.id}','${item.page}')">
    <div class="check-box">${checks[item.id]?'<svg viewBox="0 0 20 20" width="10" height="10" fill="#fff"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg>':''}</div>
    <div class="check-lbl">${item.label}</div>
    <div class="check-meta">→ ${item.page}</div>

function cvPreview() {
  const el = document.getElementById('cv-preview');
  if (!el) return;
  const g = id => { const e=$(id); return e?e.value.trim():''; };
  const prenom=g('cv-prenom'),nom=g('cv-nom');
  if (!prenom && !nom) { el.innerHTML='<div style="color:var(--ink4);font-size:.75rem;text-align:center;padding:2rem">Remplissez le formulaire pour voir l\'aperçu</div>'; return; }
  const cap = s => s?s.split(/\s+/).map(w=>w?w[0].toUpperCase()+w.slice(1).toLowerCase():'').join(' '):'';
  const esc = s => s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):'';
  let h = `<div class="cvp-name">${esc(cap(prenom))} ${esc(cap(nom).toUpperCase())}</div>`;
  const titre=g('cv-titre'); if(titre) h+=`<div style="font-size:10pt;color:#3d6b8a;font-weight:500;margin-bottom:3px">${esc(titre)}</div>`;
  const contact=[g('cv-adresse'),g('cv-tel'),g('cv-email'),g('cv-linkedin')].filter(Boolean).join(' · ');
  if(contact) h+=`<div class="cvp-contact">${esc(contact)}</div>`;
  const accroche=g('cv-accroche'); if(accroche) h+=`<div class="cvp-sec"><div class="cvp-sec-title">Objectif</div><div class="cvp-line" style="font-style:italic">${esc(accroche)}</div></div>`;
  if(expItems.some(e=>e.poste||e.societe)) {
    h+=`<div class="cvp-sec"><div class="cvp-sec-title">Expérience professionnelle</div>`;
    expItems.forEach(e=>{
      if(!e.poste&&!e.societe) return;
      h+=`<div class="cvp-line"><strong>${esc(e.dates)}</strong> — ${esc(e.poste)}${e.societe?', <em>'+esc(e.societe)+'</em>':''}${e.ville?' ('+esc(e.ville)+')':''}</div>`;
      if(e.missions) e.missions.split('\n').forEach(m=>{if(m.trim())h+=`<div class="cvp-sub">• ${esc(m.trim())}</div>`;});
    });
    h+=`</div>`;
  }
  if(formItems.some(f=>f.diplome)) {
    h+=`<div class="cvp-sec"><div class="cvp-sec-title">Formations</div>`;
    formItems.forEach(f=>{if(!f.diplome)return;h+=`<div class="cvp-line">${esc(f.dates)} — ${esc(f.diplome)}${f.etablissement?', <em>'+esc(f.etablissement)+'</em>':''}${f.ville?' ('+esc(f.ville)+')':''}</div>`;});
    h+=`</div>`;
  }
  const info=g('cv-info'),langues=g('cv-langues');
  if(info||langues) {
    h+=`<div class="cvp-sec"><div class="cvp-sec-title">Compétences</div>`;
    if(info) h+=`<div class="cvp-line"><strong>Informatique :</strong> ${esc(info)}</div>`;
    if(langues) h+=`<div class="cvp-line"><strong>Langues :</strong> ${esc(langues)}</div>`;
    h+=`</div>`;
  }
  const loisirs=g('cv-loisirs'); if(loisirs) h+=`<div class="cvp-sec"><div class="cvp-sec-title">Loisirs / Centres d'intérêt</div>${loisirs.split('\n').map(l=>`<div class="cvp-line">• ${esc(l.trim())}</div>`).join('')}</div>`;
  el.innerHTML = h;
}

function exportCV() {
  const g = id => { const e=$(id); return e?e.value.trim():''; };
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({unit:'mm',format:'a4'});
  const prenom=g('cv-prenom'),nom=g('cv-nom');
  if(!prenom&&!nom){toast('Renseignez au moins votre nom et prénom.');return;}
  doc.setFont('times','normal');doc.setFontSize(11);doc.setTextColor(26,23,20);
  const cap=s=>s?s.split(/\s+/).map(w=>w?w[0].toUpperCase()+w.slice(1).toLowerCase():'').join(' '):'';
  const M=20,W=170; let y=M;
  const LH=5.5,LHB=6;
  doc.setFont('times','bold');doc.setFontSize(14);
  doc.text(`${cap(prenom)} ${cap(nom).toUpperCase()}`,M,y);y+=8;
  const titre=g('cv-titre');
  if(titre){doc.setFont('times','normal');doc.setFontSize(11);doc.setTextColor(50,100,140);doc.text(titre,M,y);y+=6;doc.setTextColor(26,23,20);}
  const contact=[g('cv-adresse'),g('cv-tel'),g('cv-email'),g('cv-linkedin')].filter(Boolean).join(' · ');
  if(contact){doc.setFontSize(9.5);const lines=doc.splitTextToSize(contact,W);doc.text(lines,M,y);y+=lines.length*4.5+3;}
  doc.setDrawColor(180,175,168);doc.line(M,y,M+W,y);y+=4;
  const addSec=(title,items)=>{
    doc.setFont('times','bold');doc.setFontSize(9.5);doc.setTextColor(26,23,20);
    doc.text(title.toUpperCase(),M,y);y+=LHB;
    doc.setFont('times','normal');doc.setFontSize(10);
    items.forEach(({main,subs})=>{
      if(y>270)return;
      const mw=doc.splitTextToSize(main,W);doc.text(mw,M,y);y+=mw.length*LH;
      (subs||[]).forEach(s=>{const sw=doc.splitTextToSize('• '+s,W-5);doc.text(sw,M+5,y);y+=sw.length*LH;});
      y+=1.5;
    });
    y+=2;
  };
  const accroche=g('cv-accroche');
  if(accroche){doc.setFont('times','italic');doc.setFontSize(10);const aw=doc.splitTextToSize(accroche,W);doc.text(aw,M,y);doc.setFont('times','normal');y+=aw.length*LH+4;}
  if(expItems.some(e=>e.poste)){addSec('Expérience professionnelle',expItems.filter(e=>e.poste).map(e=>({main:`${e.dates||''} — ${e.poste}${e.societe?', '+e.societe:''}${e.ville?' ('+e.ville+')':''}`,subs:e.missions?e.missions.split('\n').filter(m=>m.trim()):[]})));}
  if(formItems.some(f=>f.diplome)){addSec('Formations',formItems.filter(f=>f.diplome).map(f=>({main:`${f.dates||''} — ${f.diplome}${f.etablissement?', '+f.etablissement:''}${f.ville?' ('+f.ville+')':''}`,subs:[]})));}
  const info=g('cv-info'),langues=g('cv-langues');
  if(info||langues){addSec('Compétences',[info?{main:'Informatique : '+info,subs:[]}:null,langues?{main:'Langues : '+langues,subs:[]}:null].filter(Boolean));}
  const loisirs=g('cv-loisirs');
  if(loisirs){addSec('Loisirs / Centres d\'intérêt',loisirs.split('\n').filter(l=>l.trim()).map(l=>({main:l.trim(),subs:[]})));}
  doc.save(`cv_${cap(nom).toLowerCase().replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.pdf`);
  toast('CV exporté ✓');
  $set('cv_done', true);
  updateGlobalProgress();
}

function resetCV() { if(confirm('Effacer le CV ?')){$set('cv',{});expItems=[{dates:'',poste:'',societe:'',ville:'',missions:''}];formItems=[{dates:'',diplome:'',etablissement:'',ville:''}];initCV();} }

function initLettre() {
  loadLettreProfile();
  renderLettrePanels();
}

function loadLettreProfile() {
  const p = $get('lettre_profile', {});
  if (p.civ) D.civ=p.civ;
  if (p.nom) D.nom=p.nom;
  if (p.prenom) D.prenom=p.prenom;
  ['adresse','cp','ville','email','tel','linkedin','experience','posteActuel','niveau','secteur','formule'].forEach(k=>{ if(p[k]!==undefined) D[k]=p[k]; });
  if (p.pf) D.pf=p.pf;
  // Also pull from CV if available
  const cv = $get('cv', {});
  if(!D.nom && cv.nom) D.nom=cv.nom;
  if(!D.prenom && cv.prenom) D.prenom=cv.prenom;
  if(!D.email && cv.email) D.email=cv.email;
  if(!D.tel && cv.tel) D.tel=cv.tel;
  if(!D.adresse && cv.adresse) D.adresse=cv.adresse;
}

function saveLettreProfile() {
  const p = {};
  ['civ','nom','prenom','adresse','cp','ville','email','tel','linkedin','experience','posteActuel','niveau','secteur','formule','pf'].forEach(k=>p[k]=D[k]);
  $set('lettre_profile', p);
}

let analyzeTimer = null;
function debouncedAnalyze() {
  clearTimeout(analyzeTimer);
  analyzeTimer = setTimeout(() => {
    const txt = D.offreText || D.offreUrl;
    if (txt && txt.length > 20) {
      analyse = analyzeOffre(txt);
      if (analyse.detectedNom && !D.inom) { D.iciv=analyse.detectedCiv||''; D.inom=analyse.detectedNom; D.iprenom=analyse.detectedPrenom||''; }
      if (analyse.typeEntite==='administration') { D.formule='inst'; if(!D.iciv)D.iciv='Monsieur'; if(!D.ititre)D.ititre='le Maire'; }
      else if (analyse.typeEntite==='startup') D.formule='dynamic';
      if (analyse.langEN) D.langue='en';
    }
  }, 700);
}

function analyzeOffre(txt) {
  if (!txt||txt.length<20) return {};
  let typeEntite='entreprise';
  if(/mairie|commune|ville de|hôtel de ville|collectivité|administration|ministère|département|région|préfecture/i.test(txt)) typeEntite='administration';
  else if(/startup|scale-up|levée de fonds|seed/i.test(txt)) typeEntite='startup';
  else if(/association|asso\b|fondation|ong\b/i.test(txt)) typeEntite='asso';
  const expM=txt.match(/(\d+)\s*an[s]?\s*(?:d['']expérience|minimum)/i);
  const langEN=/\b(english|fluent|bilingual|anglais courant)\b/i.test(txt)&&!/\bfrançais\b/i.test(txt);
  let detectedCiv='',detectedNom='',detectedPrenom='';
  const contactPat=/contact\s*:?\s*(madame|monsieur)\s+([A-ZÀ-Ü][a-zà-ü\-]+(?:\s+[A-ZÀ-Ü][a-zà-ü\-]+)*)/i;
  const m=txt.match(contactPat);
  if(m){detectedCiv=m[1]?m[1][0].toUpperCase()+m[1].slice(1).toLowerCase():'';const parts=(m[2]||'').trim().split(/\s+/);detectedNom=parts[parts.length-1]||'';detectedPrenom=parts.length>=2?parts[0]:'';}
  return {typeEntite,langEN,detectedCiv,detectedNom,detectedPrenom,expReq:expM?parseInt(expM[1]):0};
}

function buildPrompt(version) {

  const cNom=cap(D.nom),cPre=cap(D.prenom),villeEnvoi=cap(D.ville)||'Paris';
  const iNom=cap(D.inom),iPre=cap(D.iprenom);
  const isMairie=/mairie|commune|ville de|maire/i.test(D.offreText+D.offreUrl);
  const offreTxt=D.offreUrl?'URL de l\'offre (lire cette page) : '+D.offreUrl:D.offreText||'[Offre non renseignée]';
  const fObj=FORMULES_POLITESSE.find(f=>f.id===D.formule)||FORMULES_POLITESSE[0];
  const politesse=D.inom?(D.iciv+' '+iNom).trim():'Madame, Monsieur';
  const formuleFin=fObj.text.replace('[DEST]',politesse);
  const srcMap={annonce:'réponse à une annonce',linkedin:'LinkedIn',boite:'bouche-à-oreille',salon:'salon emploi'};
  const langMap={fr:'Français',en:'English'};
  const tonMap={formel:'formel et soutenu',dynamique:'dynamique et engagé',institutionnel:'institutionnel et sobre'};
  const typeMap={candidature:'candidature',relance:'lettre de relance',spontanee:'candidature spontanée'};
  const boldInstr=version==='bold'?'\nVERSION AUDACIEUSE : ton affirmé, accroche originale, personnalité forte mais professionnelle.':'\nVERSION SAFE : ton équilibré, professionnel, rassurant.';
  return `Tu es expert en rédaction de lettres de motivation françaises. Génère en ${langMap[D.langue]||'Français'} une lettre COMPLÈTE et PERSONNALISÉE.
${boldInstr}

=== CONTEXTE ===
Type : ${typeMap[D.typeLettre]||'candidature'} | Ton : ${tonMap[D.ton]||'formel'} | Source : ${srcMap[D.source]||'annonce'}
${D.poste?'Poste visé : '+D.poste:''}

=== CANDIDAT ===
${cNom} ${cPre} | ${D.civ||'Monsieur'} | ${cap(D.adresse)||''} ${D.cp||''} ${villeEnvoi}
${D.email||''} | ${D.tel||''}${D.linkedin?' | '+D.linkedin:''}
${D.experience?'Expérience : '+D.experience+' ans':''} ${D.posteActuel?'| '+D.posteActuel:''}
${D.pf.length?'Points forts : '+D.pf.join(', '):''}
${compChecked.length?'Compétences cochées : '+compChecked.join(', '):''}

=== OFFRE ===
${offreTxt}

=== DESTINATAIRE ===
${(D.inom||D.ititre)?(D.iciv+' '+D.ititre+' '+iNom+' '+iPre).trim():'Extraire depuis l\'offre.'}
${isMairie?'\nIMPORTANT : Adresser au Maire — Monsieur/Madame le/la Maire.':''}

=== RÈGLES (ONISEP + France Travail) ===
OBJECTIF : donner envie de rencontrer ${cPre} ${cNom} en entretien.
- 10 à 15 lignes MAX
- ZÉRO phrase générique (dynamique, passionné, polyvalent…)
- Reprendre les MOTS-CLÉS EXACTS de l'offre dans §2
- Plan : §1=2ph accroche entreprise | §2=3ph profil chiffré | §3=1ph conclusion+entretien
- Formule de politesse EXACTE : ${formuleFin}
- Accords genre : ${D.civ==='Madame'?'féminin':'masculin'}
- RÉPONDRE UNIQUEMENT AVEC LA LETTRE, SANS COMMENTAIRE.`;
}

const wcCount=s=>s?s.split(/\s+/).filter(Boolean).length:0;
const escHtml=s=>s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'';

function scoreLettre(txt) {
  const words=wcCount(txt),hasObjet=/objet\s*:/i.test(txt),hasPolitesse=/je vous prie|veuillez agr|cordialement|salutations/i.test(txt),noGeneric=!GENERIQUES.some(p=>txt.toLowerCase().includes(p)),okLen=words>=60&&words<=300;
  return {score:Math.round([hasObjet,hasPolitesse,noGeneric,okLen,words>20].filter(Boolean).length/5*100),words,hasObjet,hasPolitesse,noGeneric,okLen};
}
function scorePerso(txt) {
  const cap=s=>s?s.split(/\s+/).map(w=>w?w[0].toUpperCase()+w.slice(1).toLowerCase():'').join(' '):'';
  const checks=[
    {label:'Nom du recruteur',ok:!!(D.inom&&txt.includes(cap(D.inom)))},
    {label:'Chiffres concrets',ok:/\d+\s*(%|ans?|mois|projets?|€|personnes?)/i.test(txt)},
    {label:'Formule de politesse',ok:/je vous prie|veuillez agr|cordialement|salutations/i.test(txt)},
    {label:'Objet avec poste',ok:/objet\s*:/i.test(txt)},
    {label:'Sans phrases génériques',ok:!GENERIQUES.some(p=>txt.toLowerCase().includes(p))},
    {label:'Points forts intégrés',ok:D.pf.length>0&&D.pf.some(p=>txt.toLowerCase().includes(p.toLowerCase().slice(0,5)))},
    {label:'Longueur correcte (60-300 mots)',ok:wcCount(txt)>=60&&wcCount(txt)<=300},
    {label:'Pas d\'URL visible',ok:!/https?:\/\//.test(txt)}
  ];
  return {pct:Math.round(checks.filter(c=>c.ok).length/checks.length*100),checks};
}
function hlGenerics(txt) {
  let r=escHtml(txt);
  GENERIQUES.forEach(p=>{const re=new RegExp(p.replace(/[-\/\\^$*+?.()|[\]{}]/g,'\\$&'),'gi');r=r.replace(re,`<mark class="generic" title="Passage générique — à personnaliser">$&</mark>`);});
  return r;
}
function copyLettre(){if(!D.lettre){toast('Aucune lettre.');return;}navigator.clipboard.writeText(D.lettre).then(()=>toast('Copié ✓'));}
function emailLettre(){const cap=s=>s?s.split(/\s+/).map(w=>w?w[0].toUpperCase()+w.slice(1).toLowerCase():'').join(' '):'';const subj='Candidature — '+(D.poste||'[Poste]');const body=(D.iciv?D.iciv+',\n\n':'')+D.lettre;window.location.href='mailto:?subject='+encodeURIComponent(subj)+'&body='+encodeURIComponent(body);}
function speak(){if(!D.lettre){toast('Aucune lettre.');return;}const u=new SpeechSynthesisUtterance(D.lettre);u.lang=D.langue==='en'?'en-US':'fr-FR';speechSynthesis.speak(u);toast('Lecture en cours…');}
function regenSec(sec){if(!rawPrompt){toast('Générez le prompt d\'abord.');return;}const p=rawPrompt+'\n\nRégénère UNIQUEMENT '+sec+' (2 phrases pour §1, 3 pour §2, 1 pour §3). Réponds uniquement avec le nouveau paragraphe.';navigator.clipboard.writeText(p).then(()=>{window.open('https://chatgpt.com','_blank','noopener');toast('Prompt '+sec+' copié ✓');});}

/* ═══════════════════════════════════════
   LETTRE PDF — AFNOR NF Z 11-001
═══════════════════════════════════════ */
function buildLettrePDF() {
  const raw=D.lettre.trim();
  if(!raw){toast('Collez d\'abord la réponse de ChatGPT.');return;}
  const txt=raw.replace(/https?:\/\/[^\s\n]*/g,'').replace(/\[source[^\]]*\]/gi,'').replace(/\n{3,}/g,'\n\n').trim();
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4',orientation:'portrait'});
  doc.setFont('times','normal');doc.setFontSize(11);doc.setTextColor(26,23,20);
  const cap=s=>s?s.split(/\s+/).map(w=>w?w[0].toUpperCase()+w.slice(1).toLowerCase():'').join(' '):'';
  const M=25,PW=210,xL=M,xR=PW-M,wDest=80,xDest=105;
  const LH=5.5,LHB=6;
  const cNom=cap(D.nom||''),cPre=cap(D.prenom||''),villeEnvoi=cap(D.ville||'Paris');
  const iNom=cap(D.inom||''),iPre=cap(D.iprenom||'');
  const dateStr=new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
  const fname=`lettre_${(cNom||'candidat').toLowerCase().replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.pdf`;
  // 1. Expéditeur
  let yE=M;
  doc.setFont('times','bold');doc.text(`${cPre} ${cNom}`,xL,yE);yE+=LH+1;doc.setFont('times','normal');
  const adrLine=[cap(D.adresse),D.cp].filter(Boolean).join(' ');
  if(adrLine){doc.text(adrLine,xL,yE);yE+=LH;}
  if(D.ville){doc.text(villeEnvoi,xL,yE);yE+=LH;}
  if(D.email){doc.text(D.email,xL,yE);yE+=LH;}
  if(D.tel){doc.text(D.tel,xL,yE);}
  // 2. Date
  doc.text(`À ${villeEnvoi}, le ${dateStr}`,xR,M+2,{align:'right'});
  // 3. Destinataire
  let civTitle=D.iciv==='Monsieur'?'Monsieur':D.iciv==='Madame'?'Madame':'Madame, Monsieur';
  const nomComplet=[iPre,iNom].filter(Boolean).join(' ');
  let yDest=90;
  const entiteLine=(()=>{const m=(D.offreText||'').match(/(?:mairie|commune|ville de|société|groupe|entreprise|association)\s+([A-Z][A-Za-zÀ-ÿ\s&\-]+?)(?:\s+recrute|\s*\n|,)/i);return m?cap(m[1].trim()):''})();
  if(entiteLine){doc.setFont('times','bold');doc.splitTextToSize(entiteLine,wDest).forEach(l=>{doc.text(l,xDest,yDest);yDest+=LH;});doc.setFont('times','normal');}
  const attnLine=`À l'attention de ${nomComplet?civTitle+' '+nomComplet:civTitle}`;
  doc.splitTextToSize(attnLine,wDest).forEach(l=>{doc.text(l,xDest,yDest);yDest+=LH;});
  if(D.ititre){doc.splitTextToSize(cap(D.ititre),wDest).forEach(l=>{doc.text(l,xDest,yDest);yDest+=LH;});}
  // 4. Objet
  const yObj=Math.max(yDest+15,130);
  let objetLine='';
  const objMatch=txt.match(/^objet\s*:\s*(.+)/im);
  if(objMatch)objetLine='Objet : '+objMatch[1].trim();
  else if(D.poste)objetLine='Objet : Candidature — '+D.poste;
  else objetLine='Objet : Candidature spontanée';
  doc.setFont('times','bold');
  const objLines=doc.splitTextToSize(objetLine,xR-xL);doc.text(objLines,xL,yObj);doc.setFont('times','normal');
  // 5. Corps
  let yCorps=yObj+objLines.length*LHB+10;
  const appel=nomComplet?`${civTitle} ${iNom},`:`${civTitle},`;
  const rawLines=txt.split('\n').map(l=>l.trim());
  const hasAppel=rawLines.some(l=>/^(madame|monsieur)\b/i.test(l));
  const bodyLines=rawLines.filter(l=>!/^objet\s*:/i.test(l));
  if(!hasAppel)bodyLines.unshift(appel,'');
  let prevEmpty=false;
  for(const line of bodyLines){
    if(yCorps>268)break;
    if(!line){if(!prevEmpty)yCorps+=LH*.8;prevEmpty=true;continue;}
    prevEmpty=false;
    if(/^(madame|monsieur)[,\s]/i.test(line)){doc.setFont('times','italic');doc.text(line,xL,yCorps);doc.setFont('times','normal');yCorps+=LH+3;continue;}
    const w=doc.splitTextToSize(line,xR-xL);doc.text(w,xL,yCorps);
    yCorps+=w.length*LH;if(/[.!…]$/.test(line))yCorps+=LH*.6;
  }
  // 6. Politesse
  const yPol=Math.min(yCorps+10,250);
  const destPol=nomComplet?`${civTitle} ${iNom}`:civTitle;
  const hasFormule=/(je vous prie|veuillez agréer|salutations|cordialement)/i.test(txt);
  if(!hasFormule){const pol=`Je vous prie d'agréer, ${destPol}, l'expression de mes salutations distinguées.`;const wPol=doc.splitTextToSize(pol,xR-xL);doc.text(wPol,xL,yPol);}
  // 7. Signature
  const ySig=Math.min(yPol+25,278);
  doc.setFont('times','italic');doc.setTextColor(120,120,120);doc.text('Signature',xR,ySig-5,{align:'right'});
  doc.setFont('times','bold');doc.setTextColor(26,23,20);doc.text(`${cPre} ${cNom}`,xR,ySig,{align:'right'});
  doc.save(fname);
  // Post-PDF
  addCand((entiteLine||D.poste||'[Entité]'),D.poste||'[Poste]');
  const n=incCount();
  toast(ENCOURAGEMENTS[Math.floor(Math.random()*ENCOURAGEMENTS.length)]);
  if(n%3===0)setTimeout(()=>celebrate(n+' lettres générées !'),500);
  updateGlobalProgress();
}

  const el=document.getElementById('cand-tbody'); if(!el)return;
  const c=getCands();
  if(!c.length){el.innerHTML=`<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--ink3);font-size:.76rem">Aucune candidature — elles s'ajoutent automatiquement quand vous générez un PDF.<br><button class="btn pri sm" style="margin-top:.5rem" onclick="openAddCand()">+ Ajouter manuellement</button></td></tr>`;return;}
  el.innerHTML=c.map((x,i)=>`<tr>
    <td style="font-weight:500">${escHtml(x.entite||'—')}</td>
    <td>${escHtml(x.poste||'—')}</td>
    <td style="font-family:var(--mono);font-size:.7rem">${x.date}</td>
    <td><span class="status ${x.statut}" onclick="cycleStatus(${i})" title="Clic pour changer">${statusLabel(x.statut)}</span></td>
    <td style="font-size:.7rem;color:var(--ink3)">${relanceDate(x.date)}</td>
    <td><input style="width:120px;font-size:.7rem;padding:2px 5px;border:1px solid var(--bg2);border-radius:var(--r);background:var(--bg1)" value="${escHtml(x.note||'')}" onchange="candNote(${i},this.value)" placeholder="Note…"></td>
    <td><button class="btn ghost xs" onclick="delCand(${i})">✕</button></td>
  </tr>`).join('');
}

function cycleStatus(i){const c=getCands(),ord=['envoyee','relance','entretien','refus','acceptee'];c[i].statut=ord[(ord.indexOf(c[i].statut)+1)%ord.length];saveCands(c);renderCandTable();renderCandKPI();renderBadges();}
function delCand(i){const c=getCands();c.splice(i,1);saveCands(c);renderCandTable();renderCandKPI();renderBadges();}
function candNote(i,v){const c=getCands();c[i].note=v;saveCands(c);}
const statusLabel=s=>({envoyee:'Envoyée',relance:'Relance',entretien:'Entretien',refus:'Refus',acceptee:'Acceptée'}[s]||s);
function parseDate(s){if(!s)return null;const p=s.split('/');if(p.length!==3)return null;return new Date(p[2],p[1]-1,p[0]);}
function relanceDate(d){const dt=parseDate(d);if(!dt)return '';dt.setDate(dt.getDate()+10);return 'J+10 : '+dt.toLocaleDateString('fr-FR');}

function addCand(entite,poste){
  const c=getCands();
  const dup=c.find(x=>x.entite&&entite&&x.entite.toLowerCase().includes(entite.toLowerCase().slice(0,5)));
  if(dup){toast('⚠️ Déjà candidaté chez '+dup.entite);return;}
  c.unshift({id:Date.now(),entite,poste,date:new Date().toLocaleDateString('fr-FR'),statut:'envoyee',note:''});
  if(c.length>100)c.pop();
  saveCands(c); updateGlobalProgress();
}

function openAddCand(){
  const entite=prompt('Entité / Employeur :');
  if(!entite)return;
  const poste=prompt('Poste :');
  addCand(entite||'[Entité]',poste||'[Poste]');
  if(document.getElementById('cand-tbody'))renderCandTable();
  renderCandKPI();
}

function toggleCandMeth(){const el=document.getElementById('cand-meth');if(el)el.style.display=el.style.display==='none'?'block':'none';}

function renderCal(){
  const el=document.getElementById('cal-wrap'); if(!el)return;
  const today=new Date(),y=today.getFullYear(),m=today.getMonth();
  const days=new Date(y,m+1,0).getDate(),start=new Date(y,m,1).getDay()||7;
  const c=getCands(),cd={},rd={};
  c.forEach(x=>{const d=parseDate(x.date);if(!d)return;cd[d.getDate()+'-'+d.getMonth()]=true;const r=new Date(d);r.setDate(r.getDate()+10);rd[r.getDate()+'-'+r.getMonth()]=true;});
  let h=`<div style="font-size:.7rem;font-weight:500;margin-bottom:.4rem">${new Date(y,m,1).toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">`;
  ['L','M','M','J','V','S','D'].forEach(d=>h+=`<div style="font-size:.52rem;text-align:center;color:var(--ink3);padding:.15rem 0">${d}</div>`);
  for(let i=1;i<start;i++)h+='<div></div>';
  for(let d=1;d<=days;d++){
    const k=d+'-'+m;
    let st='',title='';
    if(cd[k]){st='background:var(--accent-bg);color:var(--accent);font-weight:600';title='Candidature envoyée';}
    if(rd[k]){st='background:var(--amber-bg);color:var(--amber);font-weight:600';title='Relance J+10';}
    if(d===today.getDate())st+=';box-shadow:inset 0 0 0 1.5px var(--accent)';
    h+=`<div style="aspect-ratio:1;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:.6rem;color:var(--ink3);cursor:default;${st}" title="${title}">${d}</div>`;
  }
  h+=`</div><div style="display:flex;gap:.5rem;margin-top:.3rem;font-size:.6rem;color:var(--ink3)"><span style="color:var(--accent)">■</span>Envoi <span style="color:var(--amber)">■</span>Relance J+10</div>`;
  el.innerHTML=h;
}

function exportCSV(){
  const c=getCands();if(!c.length){toast('Aucune candidature.');return;}
  const csv='Entité,Poste,Date,Statut,Note\n'+c.map(x=>`"${x.entite||''}","${x.poste||''}","${x.date||''}","${statusLabel(x.statut)}","${x.note||''}"`).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download='candidatures.csv';a.click();
  toast('CSV exporté ✓');
}

function renderBadges(){
  const el=document.getElementById('badges-list');if(!el)return;
  const c=getCands(),lc=getCount();
  const badges=[
    {icon:'🏆',label:'1ère lettre',ok:lc>=1},
    {icon:'🔥',label:'3 candidatures',ok:c.length>=3},
    {icon:'⭐',label:'5 lettres',ok:lc>=5},
    {icon:'🎯',label:'1er entretien',ok:c.some(x=>x.statut==='entretien')},
    {icon:'🚀',label:'Expert (10 lettres)',ok:lc>=10},
    {icon:'✨',label:'Accepté(e)',ok:c.some(x=>x.statut==='acceptee')}
  ];
  el.innerHTML=badges.map(b=>`<div class="badge ${b.ok?'unlocked':''}">${b.icon} ${b.label}</div>`).join('');
}

function setObj(v){$set('obj',parseInt(v)||5);renderObjBar();}
function renderObjBar(){
  const c=getCands(),today=new Date();
  const thisWeek=c.filter(x=>{const d=parseDate(x.date);return d&&(today-d)<7*24*3600*1000;});
  const obj=parseInt($get('obj',5));
  const pct=Math.min(100,Math.round(thisWeek.length/obj*100));
  const bar=document.getElementById('obj-bar');if(bar)bar.style.width=pct+'%';
  const sub=document.getElementById('obj-sub');if(sub)sub.textContent=`${thisWeek.length} / ${obj} cette semaine`;
  const ov=document.getElementById('obj-val');if(ov)ov.textContent=obj;
  const oi=document.getElementById('obj-input');if(oi)oi.value=obj;
}

/* ═══════════════════════════════════════
   ENTRETIEN
═══════════════════════════════════════ */
function initEntretien() {
  renderEntretienCards();
  renderFCThemes();
  renderQuestion();
  renderEntretienChecklist();
}

function renderEntretienCards(){
  const el=document.getElementById('entretien-cards');if(!el)return;
  const cards=[
    {icon:'✅',title:'Avant',desc:'Checklist complète de préparation — matériel, attitude, questions à poser'},
    {icon:'🎯',title:'Pendant',desc:'Maîtrisez votre discours, votre posture, votre regard et vos réponses'},
    {icon:'📋',title:'Après',desc:'Bilan post-entretien, lettre de remerciement, suivi de la décision'}
  ];
  el.innerHTML=cards.map(c=>`<div class="etape-card"><div class="ec-icon">${c.icon}</div><div class="ec-title">${c.title}</div><div class="ec-desc">${c.desc}</div></div>`).join('');
}

function renderFCThemes(){
  const el=document.getElementById('fc-themes');if(!el)return;
  const themes=['all',...new Set(QUESTIONS_ENTRETIEN.map(q=>q.theme))];
  el.innerHTML=themes.map(t=>`<button class="pill ${fcTheme===t?'on':''}" onclick="setFCTheme('${t}')">${t==='all'?'Toutes':t}</button>`).join('');
}

function setFCTheme(t){fcTheme=t;fcIdx=0;renderFCThemes();renderQuestion();}

function getFilteredQ(){return fcTheme==='all'?QUESTIONS_ENTRETIEN:QUESTIONS_ENTRETIEN.filter(q=>q.theme===fcTheme);}

function renderQuestion(){
  const qs=getFilteredQ();if(!qs.length)return;
  const q=qs[fcIdx%qs.length];
  const cat=document.getElementById('fc-cat'),fcq=document.getElementById('fc-q'),hint=document.getElementById('fc-hint'),hb=document.getElementById('fc-hint-btn'),cnt=document.getElementById('fc-counter');
  if(cat)cat.textContent=q.theme;
  if(fcq)fcq.textContent=q.q;
  if(hint){hint.textContent=q.hint;hint.style.display='none';}
  if(hb)hb.style.display='block';
  if(cnt)cnt.textContent=`${(fcIdx%qs.length)+1} / ${qs.length}`;
}

function showHint(){const h=document.getElementById('fc-hint'),b=document.getElementById('fc-hint-btn');if(h)h.style.display='block';if(b)b.style.display='none';}
function nextQ(){fcIdx++;renderQuestion();}
function prevQ(){fcIdx=Math.max(0,fcIdx-1);renderQuestion();}
function randomQ(){const qs=getFilteredQ();fcIdx=Math.floor(Math.random()*qs.length);renderQuestion();}

function renderEntretienChecklist(){
  const el=document.getElementById('ent-checklist'),cnt=document.getElementById('ent-ck-count');if(!el)return;
  const checks=$get('ent_ck',{});
  const done=ENTRETIEN_CHECKLIST.filter(i=>checks[i.id]).length;
  if(cnt)cnt.textContent=`${done}/${ENTRETIEN_CHECKLIST.length}`;
  el.innerHTML=ENTRETIEN_CHECKLIST.map(item=>`<div class="check-item ${checks[item.id]?'done':''}" onclick="toggleEntCk('${item.id}')">
    <div class="check-box">${checks[item.id]?'<svg viewBox="0 0 20 20" width="10" height="10" fill="#fff"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg>':''}</div>
    <div class="check-lbl">${item.label}</div>
  </div>`).join('');
}

function toggleEntCk(id){const c=$get('ent_ck',{});c[id]=!c[id];$set('ent_ck',c);renderEntretienChecklist();}

function saveBilan(){
  const g=id=>{const e=$(id);return e?e.value.trim():''};
  $set('bilan',{bien:g('bilan-bien'),mieux:g('bilan-mieux'),qnp:g('bilan-qnp'),suite:g('bilan-suite'),date:new Date().toISOString()});
  toast('Bilan enregistré ✓');updateGlobalProgress();
}

function exportFicheEntretien(){
  const {jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'a4'});
  const g=id=>{const e=$(id);return e?e.value.trim():''};
  doc.setFont('times','bold');doc.setFontSize(14);doc.text('Fiche de préparation — Entretien',20,20);
  let y=35;doc.setFont('times','normal');doc.setFontSize(11);
  const add=(label,val)=>{if(!val)return;doc.setFont('times','bold');doc.text(label,20,y);y+=6;doc.setFont('times','normal');const w=doc.splitTextToSize(val,170);doc.text(w,20,y);y+=w.length*5.5+4;};
  add('Date et heure :',g('ent-date'));add('Entreprise :',g('ent-entreprise'));add('Recruteur :',g('ent-recruteur'));add('Poste :',g('ent-poste'));add('Mes atouts :',g('ent-atouts'));add('Points faibles à valoriser :',g('ent-faibles'));add('Questions à poser :',g('ent-questions'));
  doc.save('fiche_entretien.pdf');toast('Fiche exportée ✓');
}

/* ═══════════════════════════════════════
   RESSOURCES
═══════════════════════════════════════ */
function initRessources(){
  renderRulesList();
  renderFormulesGrid();
  renderBiblioList();
}

function renderRulesList(){
  const el=document.getElementById('rules-list');if(!el)return;
  el.innerHTML=RULES.map((r,i)=>`<div class="rule-card" style="border-left-color:var(--${['accent','accent','green','green','amber','amber','purple','purple','red','red'][i]||'accent'})"><div style="display:flex;gap:.4rem;align-items:flex-start"><span style="font-family:var(--mono);font-size:.6rem;color:var(--ink4);min-width:1.2rem">${(i+1).toString().padStart(2,'0')}</span><div class="rc-text">${r}</div></div></div>`).join('');
}

function renderFormulesGrid(){
  const el=document.getElementById('formules-grid');if(!el)return;
  el.innerHTML=`<div class="grid2" style="gap:.4rem">${FORMULES_POLITESSE.map(f=>`<div class="formule-card"><div class="fc-label" style="color:${f.color}">${f.label}</div><div class="fc-text">${f.text}</div><button class="btn ghost xs" onclick="navigator.clipboard.writeText('${f.text.replace(/'/g,"\\'")}').then(()=>toast('Copié ✓'))">Copier</button></div>`).join('')}</div>`;
}

function renderBiblioList(){
  const el=document.getElementById('biblio-list');if(!el)return;
  const b=getBiblio();
  if(!b.length){el.innerHTML='<div style="font-size:.73rem;color:var(--ink3);text-align:center;padding:1rem">Bibliothèque vide — ajoutez vos formulations préférées.</div>';return;}
  el.innerHTML=b.map((x,i)=>`<div style="display:flex;align-items:flex-start;gap:.5rem;padding:.4rem 0;border-bottom:1px solid var(--bg2)"><div style="flex:1"><div style="font-size:.76rem;line-height:1.5">${escHtml(x.phrase)}</div><div style="font-size:.6rem;color:var(--ink4)">${x.date}</div></div><div style="display:flex;gap:.2rem;flex-shrink:0"><button class="btn ghost xs" onclick="navigator.clipboard.writeText('${x.phrase.replace(/'/g,"\\'").replace(/\n/g,' ')}').then(()=>toast('Copié ✓'))">Copier</button><button class="btn ghost xs" onclick="const b=getBiblio();b.splice(${i},1);$set('biblio',b);renderBiblioList()">✕</button></div></div>`).join('');
}

function addBiblio(){
  const inp=document.getElementById('biblio-input');if(!inp||!inp.value.trim())return;
  const b=getBiblio();b.unshift({phrase:inp.value.trim(),date:new Date().toLocaleDateString('fr-FR')});
  $set('biblio',b);inp.value='';renderBiblioList();toast('Formulation ajoutée ✓');
}

/* ═══════════════════════════════════════
   UI HELPERS
═══════════════════════════════════════ */
function toggleAccord(id){document.getElementById(id)?.classList.toggle('open');}

function celebrate(msg){
  const c=document.getElementById('celeb'),m=document.getElementById('celeb-msg');if(!c||!m)return;
  const cols=['#2c5f8a','#2d7a52','#b85c1a','#5b3d8a','#9b2335'];
  let h='';for(let i=0;i<20;i++){const x=Math.random()*100,dl=Math.random();h+=`<div class="confetti" style="left:${x}%;animation-delay:${dl}s;background:${cols[i%5]}"></div>`;}
  m.innerHTML=`<div class="celeb-title">${msg}</div><div style="font-size:.73rem;color:var(--ink3);margin-top:.2rem">Continuez comme ça !</div>`;
  c.innerHTML=h;c.appendChild(m);c.classList.add('show');
  setTimeout(()=>c.classList.remove('show'),3500);
}

/* ═══════════════════════════════════════
   ACCESSIBILITY & MODES
═══════════════════════════════════════ */
function toggleDark(){document.body.classList.toggle('dark');}
function toggleDy(){document.body.classList.toggle('dyslexic');document.getElementById('btn-dy')?.classList.toggle('on');}
function toggleContrast(){document.body.classList.toggle('contrast');document.getElementById('btn-ct')?.classList.toggle('on');}
function setFS(d){fsBase=Math.max(12,Math.min(21,fsBase+d));document.documentElement.style.fontSize=fsBase+'px';}
function toggleGuideMode(){guideMode=!guideMode;document.getElementById('btn-guide-mode')?.classList.toggle('on',guideMode);}

/* ═══════════════════════════════════════
   KEYBOARD SHORTCUTS
═══════════════════════════════════════ */
document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))return;
  if(e.key==='1')navTo('dashboard');
  else if(e.key==='2')navTo('cv');
  else if(e.key==='3')navTo('lettre');
  else if(e.key==='4')navTo('candidatures');
  else if(e.key==='5')navTo('entretien');
  else if(e.key==='6')navTo('ressources');
});

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
function init(){
  navTo('dashboard');
  updateSbBadge();
  updateGlobalProgress();
  // Random conseil sidebar
  conseilIdx=Math.floor(Math.random()*CONSEILS.length);
  const sb=document.getElementById('sb-conseil');
  const c=CONSEILS[conseilIdx];
  if(sb)sb.innerHTML=`<strong style="color:var(--accent)">${c.tag} :</strong> ${c.text}`;
}

window.addEventListener('load',init);

</script>
